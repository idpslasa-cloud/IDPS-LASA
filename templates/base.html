<!-- templates/base.html - FIXED VERSION -->
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}LASA IDPS - Network Security{% endblock %}</title>
    
    <!-- FIXED: {% load static %} MUST BE AT TOP LEVEL -->
    {% load static %}
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gradient">
    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2">Initializing LASA IDPS...</p>
    </div>

    <!-- Top Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold fs-4" href="/">
                <i class="fas fa-shield-halved text-danger me-2"></i>
                LASA IDPS
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="navbar-nav ms-auto align-items-center">
                <div class="status-indicator me-3" id="global-status">
                    <i class="fas fa-circle status-dot" id="status-dot"></i>
                    <span id="status-text">Loading...</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Sidebar Offcanvas -->
    <div class="offcanvas offcanvas-start bg-dark border-0 shadow-lg" tabindex="-1" id="sidebar" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title text-white" id="sidebarLabel">
                <i class="fas fa-list-ul me-2"></i>Control Panel
            </h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body p-0">
            <ul class="nav nav-pills flex-column sidebar-nav">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="showSection('overview')">
                        <i class="fas fa-gauge-high me-2"></i>Overview
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showSection('alerts')">
                        <i class="fas fa-bell me-2"></i>Live Alerts <span class="badge bg-danger ms-1" id="alert-badge">0</span>
                    </a>
                </li>
            </ul>
            <div class="control-panel p-3">
                <h6 class="text-white-50 mb-3">IDS Controls</h6>
                <div class="d-grid gap-2">
                    <button class="btn btn-success btn-lg" id="start-btn" onclick="lasa.startIDS()">
                        <i class="fas fa-play me-2"></i>Start IDS
                    </button>
                    <button class="btn btn-danger btn-lg" id="stop-btn" onclick="lasa.stopIDS()" disabled>
                        <i class="fas fa-stop me-2"></i>Stop IDS
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content pt-5 pb-5">
        <div class="container-fluid">
            <div class="row g-4 mb-5">
                <div class="col-12">
                    <div class="stat-card primary">
                        <div class="stat-icon"><i class="fas fa-shield-halved"></i></div>
                        <div class="stat-content">
                            <h3 id="threat-count">0</h3>
                            <p>Active Threats</p>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="overview-section">
                <div class="card border-0 shadow-lg">
                    <div class="card-body text-center py-5">
                        <i class="fas fa-shield-check fa-4x text-success mb-4 opacity-75"></i>
                        <h2>LASA IDPS Ready</h2>
                        <p class="lead text-muted">Click "Start IDS" to begin network monitoring</p>
                        <div id="recent-alerts"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- FIXED: Inline critical JS to avoid static file issues -->
    <script>
        // LASA Controller - INLINE VERSION
        class LASAController {
            constructor() {
                this.isRunning = false;
                this.init();
            }

            init() {
                // HIDE LOADING IMMEDIATELY
                document.getElementById('loading-overlay').style.display = 'none';
                
                this.updateStatus(false);
                this.loadInitialData();
                setInterval(() => this.loadInitialData(), 5000);
            }

            updateStatus(running) {
                this.isRunning = running;
                const dot = document.getElementById('status-dot');
                const text = document.getElementById('status-text');
                const startBtn = document.getElementById('start-btn');
                const stopBtn = document.getElementById('stop-btn');

                if (running) {
                    dot.className = 'fas fa-circle status-dot running';
                    text.textContent = 'IDS Active';
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                } else {
                    dot.className = 'fas fa-circle status-dot stopped';
                    text.textContent = 'IDS Stopped';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                }
            }

            async loadInitialData() {
                try {
                    const response = await fetch('/api/alerts/');
                    const data = await response.json();
                    document.getElementById('threat-count').textContent = 
                        data.alerts.filter(a => a.includes('CRITICAL') || a.includes('ALERT')).length;
                    document.getElementById('alert-badge').textContent = data.alerts.length;
                } catch (e) {
                    console.log('API not ready yet');
                }
            }

            async startIDS() {
                try {
                    await fetch('/api/start/', { method: 'POST' });
                    this.updateStatus(true);
                    document.getElementById('recent-alerts').innerHTML = 
                        '<div class="alert alert-success">IDS Started Successfully!</div>';
                } catch (e) {
                    alert('Start failed: ' + e.message);
                }
            }

            async stopIDS() {
                try {
                    await fetch('/api/stop/', { method: 'POST' });
                    this.updateStatus(false);
                } catch (e) {
                    alert('Stop failed: ' + e.message);
                }
            }
        }

        // Initialize immediately
        const lasa = new LASAController();
        
        function showSection(section) {
            console.log('Section:', section);
        }
    </script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
